<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horaires - Motel Barber</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <!-- Navigation Header -->
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="Visuels/Profile.jpg" alt="Motel Barber Logo" class="logo-img">
                <div class="logo-text">
                    <span class="logo-alex">Motel</span>
                    <span class="logo-barber">Barber</span>
                </div>
            </a>
            <!-- Top Navigation Categories -->
            <nav class="main-nav">
                <a href="index.html" class="nav-link">Accueil</a>
                <a href="tarifs.html" class="nav-link">Tarifs</a>
                <a href="horaires.html" class="nav-link">Horaires</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <!-- Horaires Section -->
        <section class="editorial-section" id="horaires">
            <div class="editorial-container has-gallery">
                <div class="editorial-content">
                    <h2 class="editorial-title">Horaires</h2>
                    <div class="availability-block">
                        <div class="availability-days">Mardi — Vendredi</div>
                        <div class="availability-note">Disponible sur rendez-vous uniquement.</div>
                    </div>
                </div>
                
                <div class="floating-gallery">
                    <div class="floating-img img-back" data-speed="-0.04">
                        <img src="Visuels/Pictures/1779284060774_instaPV.jpg" alt="Ambiance Salon">
                    </div>
                    <div class="floating-img img-front" data-speed="-0.12">
                        <img src="Visuels/Pictures/1779284064702_instaPV.jpg" alt="Détail Rasage Salon">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Custom Script Sheet -->
    <script src="Script.js"></script>

</html>
