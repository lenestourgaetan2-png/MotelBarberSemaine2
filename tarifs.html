<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarifs - Motel Barber</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <!-- Navigation Header -->
    <header class="main-header">
        <div class="header-container">
            <a href="Index.html" class="logo">
                <img src="Visuels/Profile.jpg" alt="Motel Barber Logo" class="logo-img">
                <div class="logo-text">
                    <span class="logo-alex">Motel</span>
                    <span class="logo-barber">Barber</span>
                </div>
            </a>
            <!-- Top Navigation Categories -->
            <nav class="main-nav">
                <a href="Index.html" class="nav-link">Accueil</a>
                <a href="tarifs.html" class="nav-link">Tarifs</a>
                <a href="horaires.html" class="nav-link">Horaires</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <!-- Tarifs Section -->
        <section class="editorial-section" id="tarifs">
            <div class="editorial-container has-gallery">
                <div class="editorial-content">
                    <h2 class="editorial-title">Tarifs</h2>
                    
                    <div class="pricing-list">
                        <div class="pricing-row">
                            <span class="pricing-service">Coupe Homme</span>
                            <span class="pricing-val">20€</span>
                        </div>
                        
                        <div class="pricing-row detailed">
                            <div class="pricing-service-group">
                                <span class="pricing-service">Entretien Barbe</span>
                                <span class="pricing-sub">Taille de la barbe et contours uniquement</span>
                            </div>
                            <span class="pricing-val">10€</span>
                        </div>
                        
                        <div class="pricing-row detailed">
                            <div class="pricing-service-group">
                                <span class="pricing-service">Barbe Traditionnelle</span>
                                <span class="pricing-sub">Taille de la barbe avec les soins de la peau, préparation au rasage et serviette chaude</span>
                            </div>
                            <span class="pricing-val">20€</span>
                        </div>
                        
                        <div class="pricing-row">
                            <span class="pricing-service">Moins de 10 ans</span>
                            <span class="pricing-val">15€</span>
                        </div>
                    </div>
                </div>
                
                <div class="floating-gallery">
                    <div class="floating-img img-back" data-speed="-0.04">
                        <img src="Visuels/Pictures/1779284051602_instaPV.jpg" alt="Coupe Homme Salon">
                    </div>
                    <div class="floating-img img-front" data-speed="-0.12">
                        <img src="Visuels/Pictures/1779284056150_instaPV.jpg" alt="Détail Coupe Salon">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Custom Script Sheet -->
    <script src="Script.js"></script>
</body>

</html>
